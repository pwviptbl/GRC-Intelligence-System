<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GRC Intelligence System</title>
  <meta name="description"
    content="Sistema de Governança, Risco e Conformidade assistido por IA Gemini 2.5 Flash Lite." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-base: #070d1a;
      --bg-surface: #0d1628;
      --bg-card: #111e35;
      --bg-hover: #162240;
      --border: #1e3258;
      --border-glow: #2a4a8c;
      --cyan: #00e5ff;
      --cyan-dim: #00b8d4;
      --green: #00ff9f;
      --green-dim: #00c97c;
      --yellow: #ffd740;
      --red: #ff5370;
      --text-1: #e8f0ff;
      --text-2: #8ca0c8;
      --text-3: #4a6090;
      --font: 'Inter', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--font);
      background: var(--bg-base);
      color: var(--text-1);
      display: flex;
    }

    /* Container raiz do Vue — precisa herdar o flex do body */
    #app {
      display: flex;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-glow);
      border-radius: 4px;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 220px;
      min-width: 220px;
      background: var(--bg-surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 0;
    }

    .logo {
      padding: 0 20px 24px;
      border-bottom: 1px solid var(--border);
    }

    .logo-icon {
      font-size: 26px;
      margin-bottom: 4px;
    }

    .logo h1 {
      font-size: 13px;
      font-weight: 700;
      color: var(--cyan);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .logo p {
      font-size: 10px;
      color: var(--text-3);
      margin-top: 2px;
    }

    nav {
      padding: 16px 12px;
      flex: 1;
    }

    .nav-label {
      font-size: 9px;
      font-weight: 700;
      color: var(--text-3);
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 0 8px;
      margin: 16px 0 6px;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 9px 12px;
      border-radius: 8px;
      background: none;
      border: none;
      color: var(--text-2);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .18s;
      text-align: left;
    }

    .nav-btn:hover {
      background: var(--bg-hover);
      color: var(--text-1);
    }

    .nav-btn.active {
      background: rgba(0, 229, 255, .1);
      color: var(--cyan);
      border: 1px solid rgba(0, 229, 255, .2);
    }

    .nav-btn .icon {
      font-size: 16px;
    }

    .nav-folder {
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--text-2);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 16px 0 8px 0;
      padding: 0 10px;
    }

    .nav-folder:hover {
      color: var(--text-1);
    }

    .nav-submenu-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-left: 12px;
      border-left: 1px solid var(--border);
      padding-left: 8px;
    }
    
    .nav-btn.submenu {
      font-size: 13px;
      padding: 8px 10px;
      height: 38px;
    }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-3);
    }

    .status-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .4
      }
    }

    /* ── MAIN ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-surface);
    }

    .topbar h2 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-1);
    }

    .topbar p {
      font-size: 12px;
      color: var(--text-3);
      margin-top: 2px;
    }

    .badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      background: rgba(0, 229, 255, .1);
      color: var(--cyan);
      border: 1px solid rgba(0, 229, 255, .25);
    }

    .content {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .view {
      display: none;
      height: 100%;
    }

    .view.active {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* ── CHAT ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .msg {
      display: flex;
      gap: 12px;
      max-width: 820px;
    }

    .msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .msg.ai .msg-avatar {
      background: rgba(0, 229, 255, .12);
      border: 1px solid rgba(0, 229, 255, .25);
    }

    .msg.user .msg-avatar {
      background: rgba(0, 255, 159, .12);
      border: 1px solid rgba(0, 255, 159, .25);
    }

    .msg-bubble {
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 13.5px;
      line-height: 1.7;
    }

    .msg.ai .msg-bubble {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-top-left-radius: 2px;
    }

    .msg.user .msg-bubble {
      background: rgba(0, 229, 255, .08);
      border: 1px solid rgba(0, 229, 255, .2);
      border-top-right-radius: 2px;
      color: var(--cyan-dim);
    }

    .msg-bubble table {
      border-collapse: collapse;
      width: 100%;
      margin: 10px 0;
      font-size: 12px;
    }

    .msg-bubble th {
      background: var(--bg-hover);
      color: var(--cyan);
      padding: 8px 12px;
      text-align: left;
      border: 1px solid var(--border);
      font-weight: 600;
    }

    .msg-bubble td {
      padding: 7px 12px;
      border: 1px solid var(--border);
      color: var(--text-2);
    }

    .msg-bubble tr:hover td {
      background: var(--bg-hover);
    }

    .msg-bubble code {
      font-family: var(--mono);
      font-size: 12px;
      background: rgba(0, 229, 255, .08);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--cyan);
    }

    .msg-bubble pre {
      background: var(--bg-base);
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 8px 0;
    }

    .msg-bubble h1,
    .msg-bubble h2,
    .msg-bubble h3 {
      color: var(--cyan);
      margin: 12px 0 6px;
    }

    .msg-bubble strong {
      color: var(--text-1);
    }

    .msg-bubble blockquote {
      border-left: 3px solid var(--cyan-dim);
      padding-left: 12px;
      color: var(--text-2);
      margin: 6px 0;
    }

    .tipo-tag {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 2px 8px;
      border-radius: 10px;
      margin-bottom: 8px;
      display: inline-block;
    }

    .tipo-consulta {
      background: rgba(0, 229, 255, .15);
      color: var(--cyan);
    }

    .tipo-cadastro {
      background: rgba(0, 255, 159, .15);
      color: var(--green);
    }

    .tipo-analise {
      background: rgba(255, 215, 64, .15);
      color: var(--yellow);
    }

    .tipo-erro {
      background: rgba(255, 83, 112, .15);
      color: var(--red);
    }

    .tipo-geral {
      background: rgba(140, 160, 200, .12);
      color: var(--text-2);
    }

    .typing-indicator {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 4px 0;
    }

    .typing-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--cyan-dim);
      animation: bounce .9s infinite;
    }

    .typing-dot:nth-child(2) {
      animation-delay: .15s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: .30s;
    }

    @keyframes bounce {

      0%,
      80%,
      100% {
        transform: scale(1)
      }

      40% {
        transform: scale(1.4)
      }
    }

    .chat-input-area {
      padding: 16px 28px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg-surface);
    }

    .chat-form {
      display: flex;
      gap: 10px;
    }

    .chat-input {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text-1);
      font-family: var(--font);
      font-size: 13.5px;
      outline: none;
      resize: none;
      transition: border-color .2s;
      height: 48px;
      line-height: 1.5;
    }

    .chat-input:focus {
      border-color: var(--cyan-dim);
    }

    .chat-input::placeholder {
      color: var(--text-3);
    }

    .send-btn {
      padding: 12px 20px;
      background: linear-gradient(135deg, var(--cyan-dim), #0077aa);
      border: none;
      border-radius: 10px;
      color: #000;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }

    .send-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(0, 229, 255, .3);
    }

    .send-btn:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none;
    }

    .hints {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .hint-chip {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 14px;
      cursor: pointer;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-3);
      transition: all .15s;
    }

    .hint-chip:hover {
      border-color: var(--cyan-dim);
      color: var(--cyan);
    }

    /* ── TABELAS (CRUD) ── */
    .table-view {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
    }

    .table-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .table-header h3 {
      font-size: 15px;
      font-weight: 600;
    }

    .btn-add {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid rgba(0, 255, 159, .3);
      background: rgba(0, 255, 159, .08);
      color: var(--green);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      font-family: var(--font);
    }

    .btn-add:hover {
      background: rgba(0, 255, 159, .15);
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
    }

    .data-table th {
      background: var(--bg-card);
      color: var(--text-3);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .data-table td {
      padding: 11px 14px;
      border-bottom: 1px solid rgba(30, 50, 88, .5);
      font-size: 13px;
      color: var(--text-2);
      vertical-align: middle;
    }

    .data-table tr:hover td {
      background: var(--bg-hover);
    }

    .data-table tbody tr:last-child td {
      border-bottom: none;
    }

    .branch-badge {
      font-family: var(--mono);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 6px;
      background: rgba(0, 229, 255, .1);
      color: var(--cyan);
      border: 1px solid rgba(0, 229, 255, .2);
    }

    .tech-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 6px;
      background: rgba(255, 215, 64, .1);
      color: var(--yellow);
      border: 1px solid rgba(255, 215, 64, .2);
    }

    .btn-del {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-3);
      font-size: 16px;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all .15s;
    }

    .btn-del:hover {
      background: rgba(255, 83, 112, .12);
      color: var(--red);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-3);
    }

    .empty-state .empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .empty-state p {
      font-size: 13px;
    }

    .table-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border-glow);
      border-radius: 14px;
      padding: 28px;
      width: 400px;
      max-width: 90vw;
    }

    .modal h3 {
      font-size: 14px;
      font-weight: 700;
      color: var(--cyan);
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .form-input,
    .form-select {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-base);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-1);
      font-family: var(--font);
      font-size: 13px;
      outline: none;
    }

    .form-input:focus,
    .form-select:focus {
      border-color: var(--cyan-dim);
    }

    .form-select option {
      background: var(--bg-card);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
    }

    .btn-cancel {
      padding: 8px 16px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-2);
      border-radius: 8px;
      cursor: pointer;
      font-family: var(--font);
      font-size: 13px;
    }

    .btn-save {
      padding: 8px 20px;
      background: linear-gradient(135deg, var(--green-dim), #007a50);
      border: none;
      border-radius: 8px;
      color: #000;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      font-family: var(--font);
    }

    /* ── STAT CARDS (Dashboard) ── */
    .stats-row {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
    }

    .stat-card .stat-label {
      font-size: 11px;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .stat-card .stat-value {
      font-size: 28px;
      font-weight: 700;
      font-family: var(--mono);
    }

    .stat-card.c1 .stat-value {
      color: var(--cyan);
    }

    .stat-card.c2 .stat-value {
      color: var(--green);
    }

    .stat-card.c3 .stat-value {
      color: var(--yellow);
    }

    /* Animação de entrada */
    .msg {
      animation: fadeInUp .25s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    /* ── LOGIN ── */
    .login-overlay {
      position: fixed; inset: 0; background: var(--bg-base);
      display: flex; align-items: center; justify-content: center; z-index: 9999;
    }
    .login-box {
      background: var(--bg-surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 40px; width: 380px; text-align: center;
      box-shadow: 0 0 60px rgba(0,229,255,.08);
    }
    .login-box h1 { font-size: 14px; color: var(--cyan); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
    .login-box .login-icon { font-size: 48px; margin-bottom: 16px; }
    .login-box p { font-size: 11px; color: var(--text-3); margin-bottom: 24px; }
    .login-box .form-group { margin-bottom: 14px; text-align: left; }
    .login-box .btn-login {
      width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 700;
      background: linear-gradient(135deg, var(--cyan-dim), var(--cyan)); color: #000;
      cursor: pointer; font-size: 13px; letter-spacing: .5px; transition: .2s;
    }
    .login-box .btn-login:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,229,255,.3); }
    .login-error { color: var(--red); font-size: 12px; margin-top: 10px; }
    .user-info {
      display: flex; align-items: center; gap: 8px; padding: 8px 12px;
      background: rgba(0,229,255,.04); border-radius: 8px; margin-bottom: 8px;
      border: 1px solid rgba(0,229,255,.1); cursor: pointer;
    }
    .user-info:hover { background: rgba(0,229,255,.08); }
  </style>
</head>

<body>
  <div id="app">

    <!-- TELA DE LOGIN -->
    <div class="login-overlay" v-if="!autenticado">
      <div class="login-box">
        <div class="login-icon">🛡️</div>
        <h1>GRC Intelligence System</h1>
        <p>DBSeller · Governança, Risco e Conformidade</p>
        <div class="form-group">
          <label>Usuário</label>
          <input class="form-input" v-model="loginForm.username" placeholder="admin"
            @keydown.enter="fazerLogin" id="input-login-user" />
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input class="form-input" type="password" v-model="loginForm.senha" placeholder="••••••••"
            @keydown.enter="fazerLogin" id="input-login-senha" />
        </div>
        <button class="btn-login" @click="fazerLogin" :disabled="loginLoading">
          {{ loginLoading ? 'Entrando...' : 'Entrar' }}
        </button>
        <div class="login-error" v-if="loginErro">{{ loginErro }}</div>
      </div>
    </div>

    <!-- APP PRINCIPAL (só visível após login) -->
    <template v-if="autenticado">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="logo">
        <div class="logo-icon">🛡️</div>
        <h1>GRC Intel</h1>
        <p>v2.0 · DBSeller</p>
      </div>
      <nav>
        <div class="user-info" @click="modal='alterar_senha'" title="Alterar senha">
          <span style="font-size:18px">👤</span>
          <div>
            <div style="font-size:11px;font-weight:600;color:var(--text-1)">{{ usuarioLogado.nome }}</div>
            <div style="font-size:10px;color:var(--text-3)">{{ usuarioLogado.username }}</div>
          </div>
        </div>
        <div class="nav-label">Principal</div>
        <button class="nav-btn" :class="{active: view==='dashboard'}" @click="switchView('dashboard')" id="nav-dashboard">
          <span class="icon">🏠</span> Dashboard
        </button>
        <button class="nav-btn" :class="{active: view==='chat'}" @click="view='chat'" id="nav-chat">

  <script>
    const { createApp, ref, computed, nextTick, onMounted } = Vue;

    createApp({
      setup() {
        const API = '';
        const view = ref('dashboard');
        const modal = ref(null);
        const loading = ref(false);

        // ── Auth ──
        const autenticado = ref(false);
        const usuarioLogado = ref({ username: '', nome: '' });
        const loginForm = ref({ username: '', senha: '' });
        const loginLoading = ref(false);
        const loginErro = ref('');
        const senhaForm = ref({ atual: '', nova: '', confirmar: '' });
        const senhaErro = ref('');
        const senhaSucesso = ref('');

        async function verificarAuth() {
          try {
            const res = await fetch(API + '/api/auth/me');
            if (res.ok) { 
              const data = await res.json(); 
              autenticado.value = true; 
              usuarioLogado.value = data; 
              switchView('dashboard');
            }
          } catch(e) {}
        }
        async function fazerLogin() {
          loginErro.value = ''; loginLoading.value = true;
          try {
            const res = await fetch(API + '/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(loginForm.value) });
            const data = await res.json();
            if (res.ok) { autenticado.value = true; usuarioLogado.value = data; loginForm.value = { username:'', senha:'' }; switchView('dashboard'); }
            else loginErro.value = data.erro || 'Erro ao entrar.';
          } catch(e) { loginErro.value = 'Erro de conexão.'; }
          finally { loginLoading.value = false; }
        }
        async function fazerLogout() {
          await fetch(API + '/api/auth/logout', { method:'POST' });
          autenticado.value = false; usuarioLogado.value = { username:'', nome:'' }; view.value = 'dashboard';
        }
        async function alterarSenha() {
          senhaErro.value = ''; senhaSucesso.value = '';

        }
        function statusStylePolitica(s) {
          const map = { vigente: 'background:rgba(0,255,159,.12);color:var(--green);border-color:rgba(0,255,159,.3)', rascunho: 'background:rgba(140,160,200,.1);color:var(--text-2);border-color:var(--border)', em_revisao: 'background:rgba(255,215,64,.1);color:var(--yellow);border-color:rgba(255,215,64,.3)', obsoleta: 'background:rgba(255,83,112,.1);color:var(--red);border-color:rgba(255,83,112,.3)' };
          return map[s] || '';
        }
        function prioridadeStyle(p) {
          return { alta: 'background:rgba(255,83,112,.12);color:var(--red);border-color:rgba(255,83,112,.3)', media: 'background:rgba(255,215,64,.1);color:var(--yellow);border-color:rgba(255,215,64,.3)', baixa: 'background:rgba(0,255,159,.1);color:var(--green);border-color:rgba(0,255,159,.3)' }[p] || '';
        }

        // ── CRUD Políticas ──
        function editarPolitica(p) { politicaEditando.value = { ...p }; modal.value = 'politica_editar'; }

        async function salvarPolitica() {
          const p = politicaEditando.value;
          if (!p.titulo || !p.categoria) return alert('Título e categoria são obrigatórios.');
          if (p.id) {
            await api(`/api/politicas/${p.id}`, { method: 'PUT', body: JSON.stringify(p) });
          } else {
            await api('/api/politicas', { method: 'POST', body: JSON.stringify(p) });
          }
          modal.value = null; await loadPoliticas();
        }

        async function gerarPoliticaIA() {
          if (!formIaCategoria.value) return alert('Informe a categoria.');
          if (!formIaRespostas.value) return alert('Preencha as informações.');
          carregandoIA.value = true;
          try {
            const res = await api('/api/governanca/politica/gerar', {
              method: 'POST',
              body: JSON.stringify({ categoria: formIaCategoria.value, respostas: formIaRespostas.value })
            });
            politicaEditando.value = { titulo: `Política de ${formIaCategoria.value}`, categoria: formIaCategoria.value, versao: '1.0', status: 'rascunho', conteudo: res.conteudo };
            modal.value = 'politica_editar';
          } finally { carregandoIA.value = false; }
        }

        async function buscarPerguntasPoliticaIA() {
          if (!formIaCategoria.value) return alert('Informe a categoria primeiro.');
          carregandoIA.value = true;
          try {
            const res = await api('/api/governanca/politica/perguntas', { method: 'POST', body: JSON.stringify({ categoria: formIaCategoria.value }) });
            perguntasIa.value = Array.isArray(res.perguntas) ? res.perguntas : [];
          } finally { carregandoIA.value = false; }
        }

        // ── CRUD Procedimentos ──
        function novaEtapa() { formProc.value.etapas.push({ nome_etapa: '', responsavel: '', descricao: '', sla: '' }); }
        function removerEtapa(idx) { formProc.value.etapas.splice(idx, 1); }

        function editarProcedimento(p) {
          api(`/api/procedimentos/${p.id}`).then(dados => {
            procedimentoEditando.value = { ...dados };
            formProc.value = { titulo: dados.titulo, tipo: dados.tipo, status: dados.status, etapas: dados.etapas || [] };
            modal.value = 'procedimento_editar';
          });
        }

        async function salvarProcedimento() {
          if (!formProc.value.titulo || !formProc.value.tipo) return alert('Título e tipo são obrigatórios.');
          const payload = { ...formProc.value };
          if (procedimentoEditando.value?.id) {
            await api(`/api/procedimentos/${procedimentoEditando.value.id}`, { method: 'PUT', body: JSON.stringify(payload) });
          } else {
            await api('/api/procedimentos', { method: 'POST', body: JSON.stringify(payload) });
          }
          modal.value = null; procedimentoEditando.value = null; await loadProcedimentos();
        }

        async function gerarEtapasIA() {
          if (!formIaTipo.value) return alert('Informe o tipo de procedimento.');
          carregandoIA.value = true;
          try {
            const res = await api('/api/governanca/procedimento/gerar', { method: 'POST', body: JSON.stringify({ tipo: formIaTipo.value }) });
            etapasIaSugeridas.value = Array.isArray(res.etapas) ? res.etapas : [];
          } finally { carregandoIA.value = false; }
        }

        function aceitarEtapasIA() {
          formProc.value = { titulo: formIaTipo.value, tipo: formIaTipo.value, status: 'rascunho', etapas: etapasIaSugeridas.value.map(e => ({ ...e })) };
          procedimentoEditando.value = null;
          modal.value = 'procedimento_editar';
        }

        // ── Análise de Lacunas ──
        async function analisarLacunas() {
          analisandoLacunas.value = true;
          resultadoLacunas.value = null;
          try {
            resultadoLacunas.value = await api('/api/governanca/lacunas');
          } finally { analisandoLacunas.value = false; }
        }

        function criarApartirDeLacuna(item) {
          if (item.tipo === 'politica') {
            formIaCategoria.value = item.categoria || item.titulo;
            openModal('politica_ia');
            view.value = 'politicas';
          } else {
            formIaTipo.value = item.titulo;
            openModal('procedimento_ia');
            view.value = 'procedimentos';
          }
        }

        // ── Exportar PDF Política ──
        function exportarPoliticaPDF(p) {
          const { jsPDF } = window.jspdf;
          const doc = new jsPDF();
          doc.setFontSize(18); doc.text(p.titulo, 14, 20);
          doc.setFontSize(10);
          doc.text(`Categoria: ${p.categoria} | Versão: ${p.versao} | Status: ${statusLabelPolitica(p.status)}`, 14, 30);
          doc.text(`Atualizado em: ${fmtDate(p.atualizado_em)}`, 14, 36);
          doc.line(14, 40, 196, 40);
          const linhas = doc.splitTextToSize(p.conteudo.replace(/#{1,6} /g, '').replace(/\*\*/g, ''), 180);
          doc.setFontSize(9);
          doc.text(linhas, 14, 48);
          doc.save(`${p.titulo.replace(/\s+/g,'_')}.pdf`);
        }

        // ── Exportar PDF Procedimento ──
        function exportarProcedimentoPDF(p) {
          api(`/api/procedimentos/${p.id}`).then(dados => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(18); doc.text(dados.titulo, 14, 20);
            doc.setFontSize(10);
            doc.text(`Tipo: ${dados.tipo} | Status: ${statusLabelPolitica(dados.status)}`, 14, 30);
            doc.line(14, 34, 196, 34);
            const rows = (dados.etapas || []).map(e => [e.nome_etapa, e.responsavel, e.descricao, e.sla]);
            doc.autoTable({
              startY: 38,
              head: [['Etapa', 'Responsável', 'Descrição', 'SLA']],
              body: rows, theme: 'grid',
              headStyles: { fillColor: [0, 119, 170] },
              styles: { fontSize: 8 }
            });
            doc.save(`${dados.titulo.replace(/\s+/g,'_')}.pdf`);
          });
        }

        const branchesUnicas = computed(() => {
           return [...new Set(instancias.value.map(i => i.branch))].filter(Boolean).sort();
        });

        const instanciasFiltradas = computed(() => {
           return instancias.value.filter(i => {
              const mCliente = !filtrosRelatorio.value.cliente || i.cliente_nome === filtrosRelatorio.value.cliente;
              const mSoftware = !filtrosRelatorio.value.software || i.software_nome === filtrosRelatorio.value.software;
              const mBranch = !filtrosRelatorio.value.branch || i.branch === filtrosRelatorio.value.branch;
              return mCliente && mSoftware && mBranch;
           });
        });

        function getTechParaSoftware(software_id) {
           const s = softwares.value.find(sw => sw.id === software_id);
           return s ? s.tecnologia : '';
        }

        function exportarCSV() {
           const rows = instanciasFiltradas.value.map(i => {
              return {
                 id: i.id,
                 cliente: i.cliente_nome,
                 software: i.software_nome,
                 branch: i.branch,
                 tecnologia: getTechParaSoftware(i.software_id),
                 url_custom: i.git_custom_url || ''
              };
           });
           
           if (!rows.length) return alert('Nenhum dado para exportar.');
           
           const headers = ['ID', 'Cliente', 'Software', 'Branch', 'Tecnologia', 'URL Custom'];
           let csvContent = "data:text/csv;charset=utf-8," + headers.join(";") + "\\n";
           
           rows.forEach(r => {
             const row = [r.id, `"${r.cliente}"`, `"${r.software}"`, `"${r.branch}"`, `"${r.tecnologia || ''}"`, `"${r.url_custom}"`];
             csvContent += row.join(";") + "\\n";
           });
           
           const encodedUri = encodeURI(csvContent);
           const link = document.createElement("a");
           link.setAttribute("href", encodedUri);
           link.setAttribute("download", "relatorio_ativos.csv");
           document.body.appendChild(link);
           link.click();
           document.body.removeChild(link);
        }

        function exportarPDF() {
           const { jsPDF } = window.jspdf;
           const doc = new jsPDF();
           
           const dataAtual = new Date().toLocaleDateString('pt-BR');
           doc.setFontSize(16);
           doc.text('Relatório Consolidado de Ativos', 14, 15);
           doc.setFontSize(10);
           doc.text(`Gerado em: ${dataAtual}`, 14, 22);

           if (filtrosRelatorio.value.cliente || filtrosRelatorio.value.software || filtrosRelatorio.value.branch) {
             let filtrosStr = [];
             if (filtrosRelatorio.value.cliente) filtrosStr.push(`Cliente: ${filtrosRelatorio.value.cliente}`);
             if (filtrosRelatorio.value.software) filtrosStr.push(`Software: ${filtrosRelatorio.value.software}`);
             if (filtrosRelatorio.value.branch) filtrosStr.push(`Branch: ${filtrosRelatorio.value.branch}`);
             doc.setFontSize(9);
             doc.text(`Filtros: ${filtrosStr.join(' | ')}`, 14, 28);
           }

           const rows = instanciasFiltradas.value.map(i => [
               i.cliente_nome,
               i.software_nome,
               i.branch,
               getTechParaSoftware(i.software_id)
           ]);
           
           if (!rows.length) return alert('Nenhum dado para exportar.');

           doc.autoTable({
               startY: filtrosRelatorio.value.cliente || filtrosRelatorio.value.software || filtrosRelatorio.value.branch ? 32 : 28,
               head: [['Cliente', 'Software', 'Branch', 'Tecnologia']],
               body: rows,
               theme: 'grid',
               headStyles: { fillColor: [0, 119, 170] },
               styles: { fontSize: 8 },
           });

           doc.save('relatorio_ativos.pdf');
        }

        async function sendMessage() {
          const msg = userInput.value.trim();
          if (!msg || loading.value) return;
          userInput.value = '';
          messages.value.push({ role: 'user', text: msg });
          loading.value = true;
          await nextTick();
          chatBox.value?.scrollTo({ top: chatBox.value.scrollHeight, behavior: 'smooth' });
          try {
            const res = await api('/api/chat', { method: 'POST', body: JSON.stringify({ mensagem: msg }) });
            messages.value.push({ role: 'ai', tipo: res.tipo, text: res.resposta });
          } catch (e) {
            messages.value.push({ role: 'ai', tipo: 'erro', text: `❌ Erro de comunicação: ${e.message}` });
          } finally {
            loading.value = false;
            await nextTick();
            chatBox.value?.scrollTo({ top: chatBox.value.scrollHeight, behavior: 'smooth' });
          }
        }

        // ── CRUD Incidentes ──
        function statusIncidenteLabel(s) {
          return { aberto: 'Aberto', investigando: 'Investigando', contido: 'Contido', resolvido: 'Resolvido', fechado: 'Fechado' }[s] || s;
        }
        function editarIncidente(i) {
          api(`/api/incidentes/${i.id}`).then(d => {
            incidenteEditando.value = d; formIncidente.value = { ...d };
            novaTimelineAcao.value = ''; novaTimelineResp.value = '';
            modal.value = 'incidente_editar';
          });
        }
        async function salvarIncidente() {
          if (!formIncidente.value.titulo) return alert('Título é obrigatório.');
          const p = { ...formIncidente.value }; delete p.timeline;
          if (incidenteEditando.value?.id) await api(`/api/incidentes/${incidenteEditando.value.id}`, { method:'PUT', body:JSON.stringify(p) });
          else await api('/api/incidentes', { method:'POST', body:JSON.stringify(p) });
          modal.value = null; incidenteEditando.value = null; await loadIncidentes();
        }
        async function adicionarTimeline() {
          if (!novaTimelineAcao.value.trim() || !incidenteEditando.value?.id) return;
          await api(`/api/incidentes/${incidenteEditando.value.id}/timeline`, { method:'POST', body:JSON.stringify({ acao:novaTimelineAcao.value, responsavel:novaTimelineResp.value }) });
          novaTimelineAcao.value = ''; novaTimelineResp.value = '';
          incidenteEditando.value = await api(`/api/incidentes/${incidenteEditando.value.id}`);
        }

        // ── CRUD Ações ──
        function editarAcao(a) { acaoEditando.value = a; formAcao.value = { ...a }; modal.value = 'acao_editar'; }
        async function salvarAcao() {
          if (!formAcao.value.titulo) return alert('Título é obrigatório.');
          if (acaoEditando.value?.id) await api(`/api/plano-acoes/${acaoEditando.value.id}`, { method:'PUT', body:JSON.stringify(formAcao.value) });
          else await api('/api/plano-acoes', { method:'POST', body:JSON.stringify(formAcao.value) });
          modal.value = null; acaoEditando.value = null; await loadAcoes();
        }
        async function atualizarStatusAcao(id, status) {
          await api(`/api/plano-acoes/${id}`, { method:'PUT', body:JSON.stringify({ status }) });
          await loadAcoes();
        }

        // ── CRUD Treinamentos ──
        function editarTreinamento(t) {
          api(`/api/treinamentos/${t.id}`).then(d => {
            treinamentoEditando.value = d; formTreino.value = { ...d };
            novoParticipante.value = ''; modal.value = 'treinamento_editar';
          });
        }
        async function salvarTreinamento() {
          if (!formTreino.value.titulo) return alert('Título é obrigatório.');
          if (treinamentoEditando.value?.id) await api(`/api/treinamentos/${treinamentoEditando.value.id}`, { method:'PUT', body:JSON.stringify(formTreino.value) });
          else await api('/api/treinamentos', { method:'POST', body:JSON.stringify(formTreino.value) });
          modal.value = null; treinamentoEditando.value = null; await loadTreinamentos();
        }
        async function adicionarParticipante() {
          if (!novoParticipante.value.trim() || !treinamentoEditando.value?.id) return;
          await api(`/api/treinamentos/${treinamentoEditando.value.id}/registros`, { method:'POST', body:JSON.stringify({ colaborador:novoParticipante.value }) });
          novoParticipante.value = '';
          treinamentoEditando.value = await api(`/api/treinamentos/${treinamentoEditando.value.id}`);
        }
        async function atualizarRegistroTreino(id, status) {
          await api(`/api/treinamentos/registros/${id}`, { method:'PUT', body:JSON.stringify({ status }) });
          treinamentoEditando.value = await api(`/api/treinamentos/${treinamentoEditando.value.id}`);
        }
        async function deletarRegistroTreino(id) {
          if(!confirm('Remover participante?')) return;
          await api(`/api/treinamentos/registros/${id}`, { method:'DELETE' });
          treinamentoEditando.value = await api(`/api/treinamentos/${treinamentoEditando.value.id}`);
        }

        // ── LGPD ──
        const categoriasLgpd = computed(() => [...new Set(lgpdItens.value.map(i => i.categoria))]);
        const lgpdItensFiltrados = computed(() => lgpdItens.value.filter(i => {
          return (!filtroLgpd.value.categoria || i.categoria === filtroLgpd.value.categoria) &&
                 (!filtroLgpd.value.conforme || i.conforme === filtroLgpd.value.conforme);
        }));
        async function atualizarLgpd(id, campo, valor) {
          await api(`/api/lgpd/${id}`, { method:'PUT', body:JSON.stringify({ [campo]:valor }) });
          await loadLgpd();
        }
        function exportarLgpdPDF() {
          const { jsPDF } = window.jspdf; const doc = new jsPDF();
          doc.setFontSize(16); doc.text('Relatório de Conformidade LGPD', 14, 15);
          doc.setFontSize(10); doc.text(`Gerado em: ${new Date().toLocaleDateString('pt-BR')}`, 14, 22);
          const rows = lgpdItensFiltrados.value.map(i => [i.artigo, i.descricao, i.categoria, i.conforme.replace('_',' '), i.observacao]);
          doc.autoTable({ startY:30, head:[['Artigo', 'Descrição', 'Categoria', 'Status', 'Obs']], body:rows, theme:'grid', styles:{fontSize:8} });
          doc.save('conformidade-lgpd.pdf');
        }

        async function deletar(recurso, id) {
          if (!confirm('Confirmar exclusão?')) return;
          await api(`/api/${recurso}/${id}`, { method: 'DELETE' });
          if (recurso === 'clientes') await loadClientes();
          if (recurso === 'softwares') await loadSoftwares();
          if (recurso === 'instancias') await loadInstancias();
        }

        async function saveCliente() {
          if (!form.value.nome) return alert('Informe o nome do cliente.');
          await api('/api/clientes', { method: 'POST', body: JSON.stringify({ nome: form.value.nome }) });
          modal.value = null; await loadClientes();
        }

        async function saveSoftware() {
          if (!form.value.nome) return alert('Informe o nome do software.');
          await api('/api/softwares', {
            method: 'POST', body: JSON.stringify({
              nome: form.value.nome, tecnologia: form.value.tecnologia || null, git_url: form.value.git_url || null
            })
          });
          modal.value = null; await loadSoftwares();
        }

        async function saveInstancia() {
          if (!form.value.cliente_id || !form.value.software_id) return alert('Selecione cliente e software.');
          await api('/api/instancias', {
            method: 'POST', body: JSON.stringify({
              cliente_id: form.value.cliente_id, software_id: form.value.software_id,
              branch: form.value.branch || 'master', git_custom_url: form.value.git_custom_url || null
            })
          });
          modal.value = null; await loadInstancias();
        }

        async function verDetalhesCliente(c) {
          clienteSelecionado.value = c;
          instanciasClienteSelecionado.value = await api(`/api/instancias/cliente/${c.id}`);
          modal.value = 'cliente_detalhes';
        }

        async function irParaNovaInstancia(clienteId) {
          if (!softwares.value.length) await loadSoftwares();
          resetForm();
          form.value.cliente_id = clienteId;
          modal.value = 'instancia';
        }

        function toggleMenuAtivos() { menuAtivosAberto.value = !menuAtivosAberto.value; }
        function toggleMenuGovernanca() { menuGovernancaAberto.value = !menuGovernancaAberto.value; }
        function toggleMenuRiscos() { menuRiscosAberto.value = !menuRiscosAberto.value; }

        return {
          view, modal, loading, userInput, chatBox, messages, hints, form, viewTitles, viewDesc, viewBadge,
          
          // Auth
          autenticado, usuarioLogado, loginForm, loginLoading, loginErro, fazerLogin, fazerLogout,
          senhaForm, senhaErro, senhaSucesso, alterarSenha,

          // Ativos
          clientes, softwares, instancias, clientesAtivos, clienteSelecionado, instanciasClienteSelecionado,
          filtrosRelatorio, branchesUnicas, instanciasFiltradas, menuAtivosAberto,
          toggleMenuAtivos, verDetalhesCliente, irParaNovaInstancia, getTechParaSoftware, exportarCSV, exportarPDF,
          saveCliente, saveSoftware, saveInstancia,

          // Gov
          menuGovernancaAberto, politicas, procedimentos, resultadoLacunas, analisandoLacunas,
          politicaEditando, procedimentoEditando, formPolitica, formProc, filtroGov, categoriasUnicas, docsGovFiltrados,
          formIaCategoria, formIaRespostas, formIaTipo, etapasIaSugeridas, perguntasIa, carregandoIA,
          toggleMenuGovernanca, statusLabelPolitica, statusStylePolitica, prioridadeStyle,
          editarPolitica, salvarPolitica, gerarPoliticaIA, buscarPerguntasPoliticaIA,
          novaEtapa, removerEtapa, editarProcedimento, salvarProcedimento, gerarEtapasIA, aceitarEtapasIA,
          analisarLacunas, criarApartirDeLacuna, exportarPoliticaPDF, exportarProcedimentoPDF, exportarRelatorioGovCSV, exportarRelatorioGovPDF,

          // Riscos
          menuRiscosAberto, toggleMenuRiscos, riscos, riscoEditando, formRisco, filtroRiscos, novoComentario, analisandoRisco, sugestaoIA,
          criticidadeStyle, statusRiscoLabel, statusRiscoStyle, riscosFiltrados, editarRisco, salvarRisco, adicionarHistorico, analisarRiscoIA, aplicarSugestaoIA, exportarRiscosCSV, exportarRiscosPDF, exportarRiscoPDF,

          // Novos Modulos
          dashData, maturidadeData, 
          incidentes, incidenteEditando, formIncidente, novaTimelineAcao, novaTimelineResp, editarIncidente, salvarIncidente, adicionarTimeline, statusIncidenteLabel,
          acoes, acaoEditando, formAcao, editarAcao, salvarAcao, atualizarStatusAcao,
          treinamentosLista, treinamentoEditando, formTreino, novoParticipante, editarTreinamento, salvarTreinamento, adicionarParticipante, atualizarRegistroTreino, deletarRegistroTreino,
          lgpdItens, filtroLgpd, categoriasLgpd, lgpdItensFiltrados, atualizarLgpd, exportarLgpdPDF,

          // Gen
          renderMd, tipoLabel, fmtDate, openModal, switchView, sendMessage, deletar
        };
      }
    }).mount('#app');
  </script>
</body>

</html>
